<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>在线阅读</title>
<style>
  :root{
    --red:#b21f1f;--gold:#d4af37;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#2b2b2b;overflow:hidden;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}

  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:10;
    height:calc(var(--safe-top) + 50px);
    padding:var(--safe-top) 12px 0;
    display:flex;align-items:center;gap:8px;
    background:linear-gradient(180deg,#8a1414,#7a1010);color:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.3);
  }
  .back{font-size:22px;line-height:1;padding:6px 10px;text-decoration:none;color:#fff;flex:0 0 auto;}
  .ttl{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;}

  .stage{
    position:absolute;top:calc(var(--safe-top) + 50px);bottom:calc(var(--safe-bottom) + 56px);
    left:0;right:0;overflow:auto;-webkit-overflow-scrolling:touch;
    display:flex;align-items:flex-start;justify-content:center;
    background:#2b2b2b;
  }
  #canvas{display:block;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.4);margin:12px 0;}

  .loading,.error{
    position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);
    text-align:center;color:#ddd;font-size:14px;padding:0 30px;line-height:1.7;
  }
  .error a{color:var(--gold);}

  .bar{
    position:fixed;bottom:0;left:0;right:0;z-index:10;
    height:calc(var(--safe-bottom) + 56px);
    padding:0 16px var(--safe-bottom);
    display:flex;align-items:center;justify-content:center;gap:18px;
    background:linear-gradient(0deg,#1f1f1f,#2b2b2b);color:#fff;
    box-shadow:0 -2px 10px rgba(0,0,0,.3);
  }
  .nav{
    width:40px;height:40px;border-radius:50%;border:none;
    background:#b21f1f;color:#fff;font-size:20px;line-height:40px;
  }
  .nav:disabled{background:#555;color:#999;}
  .nav:active:not(:disabled){background:#8a1414;}
  .page-ind{font-size:14px;letter-spacing:.06em;min-width:74px;text-align:center;}
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">‹</a>
    <div class="ttl" id="ttl">在线阅读</div>
  </div>

  <div class="stage" id="stage">
    <div class="loading" id="loading">正在加载文档…</div>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <div class="bar">
    <button class="nav" id="prev">‹</button>
    <div class="page-ind" id="ind">- / -</div>
    <button class="nav" id="next">›</button>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var file = params.get('f');
  var title = params.get('t') || '在线阅读';
  document.getElementById('ttl').textContent = title;
  document.title = title;

  var loadingEl = document.getElementById('loading');
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var stage = document.getElementById('stage');
  var indEl = document.getElementById('ind');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  if(!file){ loadingEl.className='error'; loadingEl.innerHTML='缺少文件参数'; return; }
  if(!window.pdfjsLib){ loadingEl.className='error'; loadingEl.innerHTML='阅读器加载失败，请检查网络后刷新'; return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var pdfDoc=null, pageNum=1, rendering=false, pending=null;

  function render(num){
    if(!pdfDoc) return;
    rendering=true;
    pdfDoc.getPage(num).then(function(page){
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var vw = stage.clientWidth;
      var unscaled = page.getViewport({scale:1});
      var scale = vw / unscaled.width;
      var viewport = page.getViewport({scale:scale});
      canvas.width = Math.floor(viewport.width * dpr);
      canvas.height = Math.floor(viewport.height * dpr);
      canvas.style.width = Math.floor(viewport.width) + 'px';
      canvas.style.height = Math.floor(viewport.height) + 'px';
      canvas.style.display='block';
      loadingEl.style.display='none';
      var rc = { canvasContext:ctx, viewport:viewport, transform: dpr!==1 ? [dpr,0,0,dpr,0,0] : null };
      page.render(rc).promise.then(function(){
        rendering=false;
        stage.scrollTop = 0;
        if(pending!==null){ var p=pending; pending=null; render(p); }
      });
    });
    indEl.textContent = num + ' / ' + pdfDoc.numPages;
    prevBtn.disabled = (num<=1);
    nextBtn.disabled = (num>=pdfDoc.numPages);
  }
  function queue(num){ if(rendering){ pending=num; } else { render(num); } }
  function go(delta){
    var n = pageNum + delta;
    if(n<1 || n>pdfDoc.numPages) return;
    pageNum=n; queue(pageNum);
  }

  prevBtn.addEventListener('click', function(){ go(-1); });
  nextBtn.addEventListener('click', function(){ go(1); });

  // 左右滑动翻页
  var sx=0, sy=0;
  stage.addEventListener('touchstart', function(e){ var t=e.touches[0]; sx=t.clientX; sy=t.clientY; }, {passive:true});
  stage.addEventListener('touchend', function(e){
    var t=e.changedTouches[0]; var dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ go(dx<0 ? 1 : -1); }
  });

  pdfjsLib.getDocument(file).promise.then(function(doc){
    pdfDoc=doc; render(pageNum);
  }).catch(function(err){
    loadingEl.className='error';
    loadingEl.innerHTML='文档加载失败。<br>可<a href="'+file+'">点此直接打开 PDF</a>。';
  });

  var rt;
  window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(function(){ if(pdfDoc) queue(pageNum); }, 200); });
})();
</script>
</body>
</html>
